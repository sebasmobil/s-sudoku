<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>101 Okey Takip</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0e0f11;
  --surface:#16181c;
  --surface2:#1e2127;
  --surface3:#252930;
  --border:#2e3240;
  --border2:#3a3f52;
  --accent:#e05c30;
  --accent2:#f07a50;
  --gold:#e8a020;
  --text:#f0f0f2;
  --text2:#9198b0;
  --text3:#5c6178;
  --green:#3fa068;
  --red:#d04545;
  --blue:#3a7bd5;
  --radius:10px;
  --radius-lg:16px;
}
[data-theme="light"]{
  --bg:#f4f2ee;
  --surface:#ffffff;
  --surface2:#f0ede8;
  --surface3:#e8e4de;
  --border:#d8d3cc;
  --border2:#c0bab2;
  --text:#1a1a1e;
  --text2:#6b6860;
  --text3:#a09c96;
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s}

/* LAYOUT */
.app{max-width:820px;margin:0 auto;padding:20px 16px 60px}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;letter-spacing:-0.5px}
.logo span{color:var(--accent)}
.topbar-actions{display:flex;gap:8px;align-items:center}

/* BUTTONS */
button{font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .15s}
.btn{padding:8px 16px;border-radius:var(--radius);border:1px solid var(--border2);background:transparent;color:var(--text);font-size:13px;font-weight:500}
.btn:hover{background:var(--surface2);border-color:var(--border2)}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2);border-color:var(--accent2)}
.btn-sm{padding:5px 11px;font-size:12px}
.btn-danger{border-color:var(--red);color:var(--red)}
.btn-danger:hover{background:rgba(208,69,69,.1)}
.btn-success{border-color:var(--green);color:var(--green)}
.btn-success:hover{background:rgba(63,160,104,.1)}
.btn-icon{padding:6px 8px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:16px;display:flex;align-items:center;justify-content:center;width:34px;height:34px}
.btn-icon:hover{background:var(--surface2);color:var(--text)}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px}
.card+.card{margin-top:12px}
.card-title{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:14px}

/* FORM */
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px;font-weight:500}
input,select{width:100%;padding:9px 12px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface2);color:var(--text);font-family:'DM Sans',sans-serif;font-size:16px;outline:none;transition:border .15s}
input:focus,select:focus{border-color:var(--accent)}
input::placeholder{color:var(--text3)}
select option{background:var(--surface)}

/* PLAYER CHIPS */
.chip-list{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.chip{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--surface2);border-radius:var(--radius);border:1px solid var(--border);font-size:14px}
.chip-rm{cursor:pointer;color:var(--text3);font-size:18px;line-height:1;padding:0 2px}
.chip-rm:hover{color:var(--red)}
.add-row{display:flex;gap:8px}
.add-row input{flex:1}

/* MODE SELECTOR */
.mode-grid{display:flex;gap:8px;flex-wrap:wrap}
.mode-card{flex:1;min-width:120px;padding:12px 16px;border:1px solid var(--border2);border-radius:var(--radius);cursor:pointer;text-align:center;transition:all .2s;background:var(--surface2)}
.mode-card.active{border-color:var(--accent);background:rgba(224,92,48,.1);color:var(--accent)}
.mode-card-label{font-size:13px;font-weight:500;margin-top:4px}
.mode-card-sub{font-size:11px;color:var(--text3);margin-top:2px}
.mode-card.active .mode-card-sub{color:var(--accent2)}

/* PAIR CONFIG */
.pair-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.pair-row select{flex:1}
.pair-vs{color:var(--text3);font-size:12px;white-space:nowrap}

/* TABS */
.tabs{display:flex;gap:0;margin-bottom:16px;border-bottom:1px solid var(--border)}
.tab{padding:10px 18px;font-size:14px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;font-weight:500}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab:hover{color:var(--text)}

/* SCORE TABLE */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:10px 8px;color:var(--text2);font-weight:500;border-bottom:1px solid var(--border);text-align:center;white-space:nowrap}
th.lft{text-align:left}
td{padding:8px 8px;border-bottom:1px solid var(--border);text-align:center;vertical-align:middle}
td.lft{text-align:left;color:var(--text2);white-space:nowrap;font-size:12px}
tr.total-row td{background:var(--surface2);font-weight:500;font-size:14px}
tr.winner-row td{background:rgba(63,160,104,.08);color:var(--green)}
tr.editing-row td{background:rgba(224,92,48,.05)}

/* SCORE CELL */
.sc-wrap{display:flex;flex-direction:column;align-items:center;gap:3px}
.sc-val{font-size:14px;font-weight:500}
.finish-badge{font-size:10px;background:rgba(63,160,104,.18);color:#3fa068;border-radius:5px;padding:1px 6px;font-weight:500}
.ceza-badge{font-size:10px;background:rgba(208,69,69,.15);color:#e06060;border-radius:5px;padding:1px 6px}

/* INPUT CELL */
.inp-cell{display:flex;flex-direction:column;align-items:center;gap:4px}
.sc-inp{width:68px;padding:5px 7px;text-align:center;border:1px solid var(--border2);border-radius:8px;background:var(--surface3);color:var(--text);font-size:16px}
.sc-inp:focus{border-color:var(--accent);outline:none}
.ceza-list{width:100%;display:flex;flex-direction:column;gap:3px;margin-top:2px}
.ceza-item{display:flex;gap:4px;align-items:center;background:rgba(208,69,69,.08);border-radius:6px;padding:3px 6px}
.ceza-item select{width:60px;padding:2px 4px;font-size:11px;border:1px solid var(--border2);border-radius:5px;background:var(--surface3)}
.ceza-item button{padding:1px 5px;font-size:11px;border:none;background:rgba(208,69,69,.2);color:#e06060;border-radius:4px;cursor:pointer}
.ceza-item button:hover{background:rgba(208,69,69,.35)}
.add-ceza-btn{font-size:11px;padding:3px 8px;border:1px dashed var(--border2);border-radius:6px;background:transparent;color:var(--text3);cursor:pointer;margin-top:2px;width:100%}
.add-ceza-btn:hover{border-color:var(--red);color:var(--red)}

/* PAIR LABEL IN TABLE */
.pair-label{font-size:11px;color:var(--text3);display:block}
.crown{color:var(--gold);margin-right:2px}

/* ROUND ACTIONS */
.round-acts{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;align-items:center}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px}
.stat-card{background:var(--surface2);border-radius:var(--radius);padding:14px;text-align:center}
.stat-name{font-size:11px;color:var(--text3);margin-bottom:6px}
.stat-num{font-size:26px;font-weight:700;font-family:'Syne',sans-serif}
.stat-sub{font-size:11px;color:var(--text3);margin-top:3px}

/* HISTORY */
.hist-item{display:flex;flex-direction:column;gap:6px;padding:14px;border:1px solid var(--border);border-radius:var(--radius-lg);background:var(--surface);cursor:pointer;transition:border-color .2s}
.hist-item:hover{border-color:var(--border2)}
.hist-item+.hist-item{margin-top:8px}
.hist-top{display:flex;justify-content:space-between;align-items:flex-start}
.hist-date{font-size:12px;color:var(--text3)}
.hist-winner{font-size:13px;font-weight:500;color:var(--green)}
.hist-scores{display:flex;flex-wrap:wrap;gap:8px}
.hist-score{font-size:12px;color:var(--text2)}

/* EMPTY */
.empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:14px}

/* ALERT */
.warn-text{font-size:12px;color:var(--gold);margin-top:6px}

/* ANIMATIONS */
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.fade-in{animation:fadeIn .25s ease}

/* DETAIL TABLE */
.row-edit-btn{background:transparent;border:none;color:var(--text3);cursor:pointer;padding:2px 4px;border-radius:5px;display:inline-flex;align-items:center;transition:color .15s,background .15s}
.row-edit-btn:hover{color:var(--accent);background:rgba(224,92,48,.1)}
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--text2);cursor:pointer;margin-bottom:14px;padding:6px 10px;border-radius:var(--radius);border:1px solid var(--border)}
.back-btn:hover{background:var(--surface2);color:var(--text)}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="logo">101 <span>Okey</span></div>
    <div class="topbar-actions">
      <button class="btn-icon" id="themeBtn" title="Tema değiştir">&#9680;</button>
      <button class="btn btn-sm" id="histBtn">Geçmiş</button>
      <button class="btn btn-sm" id="newGameBtn">Yeni Oyun</button>
    </div>
  </div>
  <div id="view" class="fade-in"></div>
</div>

<script>
const SK='okey101_v4';
function load(){try{return JSON.parse(localStorage.getItem(SK)||'{}')}catch{return {}}}
function save(d){localStorage.setItem(SK,JSON.stringify(d))}

let S=load();
if(!S.history)S.history=[];
if(!S.theme)S.theme='dark';
document.documentElement.dataset.theme=S.theme==='light'?'light':'';

const view=document.getElementById('view');
function render(fn){view.innerHTML='';view.className='fade-in';fn()}

/* THEME */
document.getElementById('themeBtn').onclick=()=>{
  S.theme=S.theme==='light'?'dark':'light';
  document.documentElement.dataset.theme=S.theme==='light'?'light':'';
  save(S);
};

/* TOP BUTTONS */
document.getElementById('newGameBtn').onclick=()=>{
  if(S.current&&!confirm('Aktif oyun var! Yeni oyun mevcut oyunu siler. Devam?'))return;
  S.current=null;save(S);render(renderSetup);
};
document.getElementById('histBtn').onclick=()=>render(renderHistory);

/* ===== SETUP ===== */
function renderSetup(){
  const cur=S.current||{};
  let players=[...((cur.players&&cur.players.length)?cur.players:[])];
  let mode=cur.mode||'tekli';
  let rounds=cur.rounds||7;
  let partners=cur.partners||{};

  view.innerHTML=`
  <div class="card">
    <div class="card-title">Oyuncular</div>
    <div class="chip-list" id="chipList"></div>
    <div class="add-row">
      <input id="pname" placeholder="Oyuncu adı..." maxlength="16"/>
      <button class="btn btn-success" id="addP">+ Ekle</button>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Oyun Modu</div>
    <div class="mode-grid">
      <div class="mode-card ${mode==='tekli'?'active':''}" data-mode="tekli">
        <div style="font-size:20px">&#128100;</div>
        <div class="mode-card-label">Tekli</div>
        <div class="mode-card-sub">Her kişi ayrı</div>
      </div>
      <div class="mode-card ${mode==='esli'?'active':''}" data-mode="esli">
        <div style="font-size:20px">&#128101;</div>
        <div class="mode-card-label">Eşli</div>
        <div class="mode-card-sub">Çift puan girişi</div>
      </div>
    </div>
    <div id="partnerArea" style="margin-top:14px"></div>
  </div>
  <div class="card">
    <div class="card-title">El Sayısı</div>
    <div style="display:flex;align-items:center;gap:12px">
      <input type="number" id="roundCount" min="1" max="30" value="${rounds}" style="width:90px"/>
      <span style="font-size:13px;color:var(--text2)">el oynanacak</span>
    </div>
  </div>
  <div style="margin-top:14px">
    <button class="btn btn-primary" id="startBtn" style="width:100%;padding:12px;font-size:15px;font-family:'Syne',sans-serif;font-weight:700">Oyunu Başlat</button>
  </div>`;

  function drawChips(){
    const cl=document.getElementById('chipList');
    cl.innerHTML=players.length?players.map((p,i)=>`
      <div class="chip">
        <span>${p}</span>
        <span class="chip-rm" data-i="${i}">&times;</span>
      </div>`).join('')
      :'<div style="font-size:13px;color:var(--text3);padding:4px 0">Henüz oyuncu eklenmedi</div>';
    cl.querySelectorAll('.chip-rm').forEach(b=>b.onclick=()=>{players.splice(+b.dataset.i,1);drawChips();drawPartners()});
  }

  function drawPartners(){
    const el=document.getElementById('partnerArea');
    if(mode!=='esli'){el.innerHTML='';return}
    if(players.length<2){el.innerHTML='<p class="warn-text">Eşli oyun için en az 2 oyuncu gerekli.</p>';return}
    if(players.length%2!==0){el.innerHTML='<p class="warn-text">Eşli oyun için çift sayıda oyuncu gerekli.</p>';return}
    const pairs=[];
    const used=new Set();
    const saved=partners;
    players.forEach(p=>{
      if(used.has(p))return;
      const prev=saved[p];
      if(prev&&players.includes(prev)&&!used.has(prev)){pairs.push([p,prev]);used.add(p);used.add(prev)}
    });
    players.forEach(p=>{if(!used.has(p)){const partner=players.find(x=>!used.has(x)&&x!==p);if(partner){pairs.push([p,partner]);used.add(p);used.add(partner)}}});
    el.innerHTML='<div style="font-size:12px;color:var(--text2);margin-bottom:8px;font-weight:500">Eş Çiftleri</div>'+
      pairs.map((pair,pi)=>`
      <div class="pair-row">
        <select class="ps" data-pi="${pi}" data-side="0">${players.map(p=>`<option${p===pair[0]?' selected':''}>${p}</option>`).join('')}</select>
        <span class="pair-vs">&amp;</span>
        <select class="ps" data-pi="${pi}" data-side="1">${players.map(p=>`<option${p===pair[1]?' selected':''}>${p}</option>`).join('')}</select>
      </div>`).join('');
  }

  drawChips();drawPartners();

  document.getElementById('addP').onclick=()=>{
    const inp=document.getElementById('pname');const v=inp.value.trim();
    if(!v||players.includes(v))return;
    players.push(v);inp.value='';drawChips();drawPartners();
  };
  document.getElementById('pname').onkeydown=e=>{if(e.key==='Enter')document.getElementById('addP').click()};

  view.querySelectorAll('.mode-card').forEach(c=>{
    c.onclick=()=>{mode=c.dataset.mode;view.querySelectorAll('.mode-card').forEach(x=>x.classList.remove('active'));c.classList.add('active');drawPartners()};
  });

  document.getElementById('startBtn').onclick=()=>{
    if(players.length<2){alert('En az 2 oyuncu gerekli!');return}
    if(mode==='esli'&&players.length%2!==0){alert('Eşli oyun için çift sayıda oyuncu gerekli!');return}
    rounds=parseInt(document.getElementById('roundCount').value)||7;
    let finalPartners={};
    let pairs=[];
    if(mode==='esli'){
      const sels=view.querySelectorAll('.ps');
      const pm={};
      sels.forEach(s=>{const pi=s.dataset.pi,sd=+s.dataset.side;if(!pm[pi])pm[pi]=[];pm[pi][sd]=s.value});
      Object.values(pm).forEach(pair=>{
        finalPartners[pair[0]]=pair[1];finalPartners[pair[1]]=pair[0];
        pairs.push([pair[0],pair[1]]);
      });
    }
    /* scores: eşli modda "pairs" başına bir giriş; tekli modda kişi başına */
    let scoreUnits=mode==='esli'?pairs:players.map(p=>[p]);
    S.current={
      players,mode,rounds,partners:finalPartners,pairs,scoreUnits,
      scores:scoreUnits.map(()=>Array.from({length:rounds},()=>({val:null,penalties:[]}))),
      startedAt:Date.now()
    };
    save(S);render(renderGame);
  };
}

/* ===== GAME ===== */
function renderGame(){
  const g=S.current;if(!g){render(renderSetup);return}
  const {players,mode,rounds,partners,pairs,scoreUnits,scores}=g;

  /* Total per unit */
  function unitTotal(ui){return scores[ui].reduce((s,r)=>s+(r.val||0)+r.penalties.reduce((a,p)=>a+p.amount,0)+(r.finish?-(r.finishAmt||101):0),0)}
  /* Display label for unit */
  function unitLabel(ui){
    const u=scoreUnits[ui];
    if(mode==='esli')return u[0]+' & '+u[1];
    return u[0];
  }
  function unitSub(ui){return mode==='esli'?'Çift puanı':''}

  let editingRound=null;
  let pending={};/* ui -> {val, penalties:[{amount}]} */

  function filledCount(){return scores[0].filter(r=>r.val!==null).length}

  function winners(){
    const totals=scoreUnits.map((_,ui)=>unitTotal(ui));
    const mn=Math.min(...totals);
    return totals.map(t=>t===mn);
  }

  function buildTable(){
    const ws=winners();
    const fc=filledCount();
    let h=`<table><thead><tr><th class="lft" style="width:52px">El</th>`;
    scoreUnits.forEach((u,ui)=>{
      const isW=ws[ui]&&fc===rounds;
      h+=`<th>${isW?'<span class="crown">&#9733;</span>':''}<span style="font-size:14px;color:var(--text)">${unitLabel(ui)}</span>${mode==='esli'?`<span class="pair-label">çift</span>`:'&nbsp;'}</th>`;
    });
    h+=`</tr></thead><tbody>`;

    for(let r=0;r<rounds;r++){
      const filled=scores[0][r].val!==null;
      const editing=editingRound===r;
      const editBtn=filled&&editingRound===null?`<button class="row-edit-btn" data-r="${r}" title="Düzenle"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>`:'';
      h+=`<tr class="${editing?'editing-row':''}"><td class="lft"><span style="display:flex;align-items:center;gap:5px">${r+1}. el${editBtn}</span></td>`;
      scoreUnits.forEach((_,ui)=>{
        const sc=scores[ui][r];
        if(editing){
          const pv=pending[ui]!==undefined?pending[ui].val:'';
          const cezalar=pending[ui]?pending[ui].penalties:[];
          const fin=pending[ui]?pending[ui].finish:false;
          const finAmt=pending[ui]?pending[ui].finishAmt:101;
          h+=`<td><div class="inp-cell">
            <input class="sc-inp" type="number" inputmode="numeric" pattern="[0-9]*" data-ui="${ui}" value="${pv}" placeholder="puan" style="display:${fin?'none':'block'}"/>
            ${fin?`<span style="font-size:18px;font-weight:700;color:var(--green);font-family:'Syne',sans-serif">-${finAmt}</span>`:''}
            <div class="finish-row" style="display:flex;align-items:center;gap:5px;margin-top:3px;padding:4px 7px;border-radius:7px;border:1px dashed ${fin?'var(--green)':'var(--border)'};background:${fin?'rgba(63,160,104,.1)':'transparent'}">
              <input type="checkbox" class="fin-chk" data-ui="${ui}" ${fin?'checked':''} style="width:14px;height:14px;accent-color:var(--green);cursor:pointer"/>
              <span style="font-size:11px;color:${fin?'var(--green)':'var(--text3)'}">Bitirdi</span>
              <select class="fin-amt" data-ui="${ui}" style="width:58px;padding:2px 4px;font-size:11px;border:1px solid var(--border2);border-radius:5px;background:var(--surface3);color:var(--text);opacity:${fin?1:.4};pointer-events:${fin?'auto':'none'}">
                <option value="101"${finAmt===101?' selected':''}>-101</option>
                <option value="100"${finAmt===100?' selected':''}>-100</option>
              </select>
            </div>
            <div class="ceza-list" id="cl_${ui}">
              ${cezalar.map((c,ci)=>`<div class="ceza-item">
                <select class="ceza-sel" data-ui="${ui}" data-ci="${ci}">
                  <option${c.amount===100?' selected':''}>100</option>
                  <option${c.amount===101?' selected':''}>101</option>
                </select>
                <span style="font-size:11px;color:var(--text3)">ceza</span>
                <button class="rm-ceza" data-ui="${ui}" data-ci="${ci}">&times;</button>
              </div>`).join('')}
            </div>
            <button class="add-ceza-btn" data-ui="${ui}">+ ceza ekle</button>
          </div></td>`;
        } else if(filled){
          const pen=sc.penalties.reduce((a,p)=>a+p.amount,0);
          const finBadge=sc.finish?`<span class="finish-badge">-${sc.finishAmt||101}</span>`:'';
          h+=`<td><div class="sc-wrap">${sc.finish?'':` <span class="sc-val">${sc.val}</span>`}${finBadge}${sc.penalties.length?`<span class="ceza-badge">+${pen}</span>`:''}</div></td>`;
        } else {
          h+=`<td><span style="color:var(--text3)">—</span></td>`;
        }
      });
      h+=`</tr>`;
    }

    h+=`<tr class="total-row"><td class="lft">Toplam</td>`;
    scoreUnits.forEach((_,ui)=>{
      const t=unitTotal(ui);const isW=ws[ui];
      h+=`<td style="${isW?'color:var(--green)':''}">${isW?'&#9733; ':''}${t}</td>`;
    });
    h+=`</tr></tbody></table>`;
    return h;
  }

  function buildActions(){
    const fc=filledCount();
    if(editingRound!==null){
      return `<button class="btn btn-success" id="saveRound">Kaydet</button>
              <button class="btn" id="cancelRound">Vazgeç</button>
              ${scores[0][editingRound].val!==null?'<button class="btn btn-danger btn-sm" id="delRound">Bu eli sil</button>':''}`;
    }
    const nextEmpty=scores[0].findIndex(r=>r.val===null);
    let a='';
    if(nextEmpty>=0)a+=`<button class="btn btn-primary" id="addRound">${nextEmpty+1}. eli gir</button>`;
    if(fc>0)a+=`<button class="btn btn-sm btn-danger" id="endSet">Seti bitir &amp; kaydet</button>`;
    return a;
  }

  function rerender(){
    document.getElementById('scoreTableWrap').innerHTML=buildTable();
    document.getElementById('roundActsWrap').innerHTML=buildActions();
    bindEvents();
  }

  function bindEvents(){
    /* finish checkbox */
    view.querySelectorAll('.fin-chk').forEach(chk=>{
      const ui=+chk.dataset.ui;
      chk.onchange=()=>{pending[ui].finish=chk.checked;rerender()};
    });
    /* finish amount */
    view.querySelectorAll('.fin-amt').forEach(sel=>{
      const ui=+sel.dataset.ui;
      sel.onchange=()=>{pending[ui].finishAmt=+sel.value};
    });
    /* score inputs */
    view.querySelectorAll('.sc-inp').forEach(inp=>{
      const ui=+inp.dataset.ui;
      if(!pending[ui])pending[ui]={val:'',penalties:[]};
      inp.oninput=()=>{pending[ui].val=inp.value===''?'':+inp.value};
    });
    /* add ceza */
    view.querySelectorAll('.add-ceza-btn').forEach(btn=>{
      btn.onclick=()=>{const ui=+btn.dataset.ui;if(!pending[ui])pending[ui]={val:'',penalties:[]};pending[ui].penalties.push({amount:101});rerender()};
    });
    /* remove ceza */
    view.querySelectorAll('.rm-ceza').forEach(btn=>{
      btn.onclick=()=>{const ui=+btn.dataset.ui,ci=+btn.dataset.ci;pending[ui].penalties.splice(ci,1);rerender()};
    });
    /* ceza select */
    view.querySelectorAll('.ceza-sel').forEach(sel=>{
      sel.onchange=()=>{const ui=+sel.dataset.ui,ci=+sel.dataset.ci;pending[ui].penalties[ci].amount=+sel.value};
    });

    const saveBtn=document.getElementById('saveRound');
    if(saveBtn)saveBtn.onclick=()=>{
      let ok=true;
      scoreUnits.forEach((_,ui)=>{if(!pending[ui].finish&&(pending[ui].val===''||pending[ui].val===null||pending[ui].val===undefined))ok=false});
      if(!ok){alert('Tüm '+( mode==='esli'?'çiftler':'oyuncular')+' için puan girin!');return}
      scoreUnits.forEach((_,ui)=>{
        const fin=pending[ui].finish||false;
        const finAmt=pending[ui].finishAmt||101;
        scores[ui][editingRound]={val:fin?0:+pending[ui].val,penalties:[...pending[ui].penalties],finish:fin,finishAmt:finAmt};
      });
      editingRound=null;pending={};S.current.scores=scores;save(S);rerender();
    };
    const cancelBtn=document.getElementById('cancelRound');
    if(cancelBtn)cancelBtn.onclick=()=>{editingRound=null;pending={};rerender()};
    const delBtn=document.getElementById('delRound');
    if(delBtn)delBtn.onclick=()=>{
      scoreUnits.forEach((_,ui)=>{scores[ui][editingRound]={val:null,penalties:[]}});
      editingRound=null;pending={};S.current.scores=scores;save(S);rerender();
    };
    const addBtn=document.getElementById('addRound');
    if(addBtn)addBtn.onclick=()=>{
      editingRound=scores[0].findIndex(r=>r.val===null);
      pending={};scoreUnits.forEach((_,ui)=>{pending[ui]={val:'',penalties:[],finish:false,finishAmt:101}});rerender();
    };
    /* per-row edit buttons */
    view.querySelectorAll('.row-edit-btn').forEach(btn=>{
      btn.onclick=()=>{
        const r=+btn.dataset.r;
        editingRound=r;
        pending={};
        scoreUnits.forEach((_,ui)=>{pending[ui]={val:scores[ui][r].val,penalties:[...scores[ui][r].penalties],finish:scores[ui][r].finish||false,finishAmt:scores[ui][r].finishAmt||101}});
        rerender();
      };
    });
    const endBtn=document.getElementById('endSet');
    if(endBtn)endBtn.onclick=()=>{
      if(!confirm('Seti bitirip geçmişe kaydetmek istiyor musunuz?'))return;
      const totals=scoreUnits.map((_,ui)=>unitTotal(ui));
      const mn=Math.min(...totals);
      const winnerUnits=scoreUnits.filter((_,ui)=>totals[ui]===mn).map(u=>u.join(' & '));
      S.history.unshift({
        id:Date.now(),date:Date.now(),players,mode,rounds,partners,pairs,scoreUnits,
        scores:JSON.parse(JSON.stringify(scores)),totals,winnerUnits
      });
      S.current=null;save(S);render(renderHistory);
    };
  }

  view.innerHTML=`
  <div class="tabs">
    <div class="tab active" data-t="game">Skor Tablosu</div>
    <div class="tab" data-t="stats">İstatistik</div>
  </div>
  <div id="tab-game">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div>
          <span style="font-family:'Syne',sans-serif;font-weight:700;font-size:15px">${mode==='esli'?'Eşli Oyun':'Tekli Oyun'}</span>
          <span style="font-size:12px;color:var(--text3);margin-left:8px" id="elInfo"></span>
        </div>
      </div>
      <div class="tbl-wrap" id="scoreTableWrap"></div>
      <div class="round-acts" id="roundActsWrap"></div>
    </div>
  </div>
  <div id="tab-stats" style="display:none"></div>`;

  function updateElInfo(){
    const el=document.getElementById('elInfo');
    if(el)el.textContent=`${filledCount()}/${rounds} el`;
  }

  const origRerender=rerender;
  function rerenderAll(){origRerender();updateElInfo();}
  /* override */
  window._rerender=rerenderAll;

  document.getElementById('scoreTableWrap').innerHTML=buildTable();
  document.getElementById('roundActsWrap').innerHTML=buildActions();
  updateElInfo();
  bindEvents();

  /* tabs */
  view.querySelectorAll('.tab').forEach(tab=>{
    tab.onclick=()=>{
      view.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));tab.classList.add('active');
      const t=tab.dataset.t;
      document.getElementById('tab-game').style.display=t==='game'?'':'none';
      const ts=document.getElementById('tab-stats');ts.style.display=t==='stats'?'':'none';
      if(t==='stats')renderStats(ts);
    };
  });
}

function renderStats(el){
  const g=S.current;if(!g){el.innerHTML='<div class="empty">Aktif oyun yok.</div>';return}
  const {scoreUnits,scores,mode}=g;
  function unitTotal(ui){return scores[ui].reduce((s,r)=>s+(r.val||0)+r.penalties.reduce((a,p)=>a+p.amount,0),0)}
  function unitLabel(ui){return mode==='esli'?scoreUnits[ui].join(' & '):scoreUnits[ui][0]}
  const totals=scoreUnits.map((_,ui)=>unitTotal(ui));const mn=Math.min(...totals);
  const penCounts=scoreUnits.map((_,ui)=>scores[ui].reduce((s,r)=>s+r.penalties.length,0));
  el.innerHTML=`<div class="card"><div class="card-title">Anlık Durum</div><div class="stats-grid">${
    scoreUnits.map((_,ui)=>`<div class="stat-card">
      <div class="stat-name">${unitLabel(ui)}</div>
      <div class="stat-num" style="color:${totals[ui]===mn?'var(--green)':'var(--text)'}">${totals[ui]}</div>
      <div class="stat-sub">${penCounts[ui]} ceza</div>
    </div>`).join('')}</div></div>`;
}

/* ===== HISTORY ===== */
function renderHistory(){
  view.innerHTML=`<div class="card"><div class="card-title">Geçmiş Setler</div><div id="hl"></div></div>`;
  const hl=document.getElementById('hl');
  if(!S.history.length){hl.innerHTML='<div class="empty">Henüz kayıtlı set yok.</div>';return}
  hl.innerHTML=S.history.map((h,hi)=>`
    <div class="hist-item" data-hi="${hi}">
      <div class="hist-top">
        <span class="hist-date">${fmtDate(h.date)} &middot; ${h.mode==='esli'?'Eşli':'Tekli'} &middot; ${h.rounds} el</span>
        <button class="btn btn-sm btn-danger del-hist" data-hi="${hi}">Sil</button>
      </div>
      <div class="hist-winner">&#9733; ${h.winnerUnits.join(' &amp; ')}</div>
      <div class="hist-scores">${h.scoreUnits.map((_,ui)=>`<span class="hist-score">${h.mode==='esli'?h.scoreUnits[ui].join(' & '):h.scoreUnits[ui][0]}: <b>${h.totals[ui]}</b></span>`).join('')}</div>
    </div>`).join('');
  hl.querySelectorAll('.del-hist').forEach(btn=>{
    btn.onclick=e=>{e.stopPropagation();if(!confirm('Bu seti silmek istiyor musunuz?'))return;S.history.splice(+btn.dataset.hi,1);save(S);renderHistory()};
  });
  hl.querySelectorAll('[data-hi]').forEach(item=>{
    item.onclick=e=>{if(e.target.tagName==='BUTTON')return;renderHistDetail(+item.dataset.hi)};
  });
}

function renderHistDetail(hi){
  const h=S.history[hi];
  const {scoreUnits,rounds,scores,mode,totals,winnerUnits}=h;
  function unitLabel(ui){return mode==='esli'?scoreUnits[ui].join(' & '):scoreUnits[ui][0]}
  view.innerHTML=`
  <div class="back-btn" id="backBtn">&#8592; Geçmişe Dön</div>
  <div class="card">
    <div class="card-title">${fmtDate(h.date)} &middot; ${mode==='esli'?'Eşli':'Tekli'} &middot; Kazanan: ${winnerUnits.join(', ')}</div>
    <div class="tbl-wrap">
      <table>
        <thead><tr><th class="lft" style="width:52px">El</th>${scoreUnits.map((_,ui)=>`<th>${unitLabel(ui)}</th>`).join('')}</tr></thead>
        <tbody>
        ${Array.from({length:rounds},(_,r)=>`<tr><td class="lft">${r+1}. el</td>${
          scoreUnits.map((_,ui)=>{
            const sc=scores[ui][r];const pen=sc.penalties.reduce((a,p)=>a+p.amount,0);
            const finBadge=sc.finish?`<span class="finish-badge">-${sc.finishAmt||101}</span>`:'';
            return `<td><div class="sc-wrap"><span class="sc-val">${sc.val!==null?sc.val:'—'}</span>${finBadge}${sc.penalties.length?`<span class="ceza-badge">+${pen}</span>`:''}</div></td>`;
          }).join('')
        }</tr>`).join('')}
        <tr class="total-row"><td class="lft">Toplam</td>${scoreUnits.map((_,ui)=>{
          const isW=winnerUnits.some(w=>w===unitLabel(ui));
          return `<td style="${isW?'color:var(--green)':''}">${isW?'&#9733; ':''}${totals[ui]}</td>`;
        }).join('')}</tr>
        </tbody>
      </table>
    </div>
  </div>`;
  document.getElementById('backBtn').onclick=()=>render(renderHistory);
}

function fmtDate(ts){
  const d=new Date(ts);
  return d.toLocaleDateString('tr-TR',{day:'2-digit',month:'2-digit',year:'numeric'})+' '+d.toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'});
}

/* INIT */
if(S.current)render(renderGame);
else if(S.history.length)render(renderHistory);
else render(renderSetup);
</script>
</body>
</html>
