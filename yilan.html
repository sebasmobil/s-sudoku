<title>Yilan Oyunu</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  width:100%;height:100%;overflow:hidden;
  font-family:Arial,sans-serif;
  background:#0a0a0f;color:#eee;
  display:flex;flex-direction:column;align-items:stretch;
  touch-action:manipulation;
  transition: background 0.3s;
}

/* INFO BAR */
#infobar{
  flex:0 0 auto;display:flex;align-items:center;justify-content:center;
  padding:3px 12px 1px;font-size:9px;letter-spacing:0.4px;
  opacity:0.45;gap:6px;white-space:nowrap;overflow:hidden;
}
#infobar a{color:inherit;text-decoration:none;}

/* TOP STATS */
#topbar{
  flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;
  padding:4px 12px 2px;
}
.hb{display:flex;flex-direction:column;min-width:50px;}
.hb.r{align-items:flex-end;}
.hl{font-size:9px;letter-spacing:1px;text-transform:uppercase;opacity:0.45;}
.hv{font-size:19px;font-weight:700;line-height:1.1;}
#lvlbadge{
  display:flex;flex-direction:column;align-items:center;
  border-radius:10px;padding:3px 10px;border:1px solid #3a3a3a;min-width:90px;
}
#lvltxt{font-size:8px;letter-spacing:0.5px;opacity:0.6;text-align:center;}
#lvlnum{font-size:15px;font-weight:700;color:#3fb950;line-height:1.1;}

/* ACTION BAR */
#actionbar{
  flex:0 0 auto;display:flex;align-items:center;justify-content:center;
  gap:7px;padding:2px 10px;
}
#startbtn{
  width:46px;height:46px;border-radius:23px;
  background:#3fb950;border:3px solid #56d364;
  color:#0d1117;font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;font-weight:bold;flex-shrink:0;
}
#startbtn:active{opacity:0.8;}
#startbtn.pau{background:#f0a030;border-color:#f5b942;}
#thsel{
  font-size:11px;padding:5px 6px;border-radius:10px;cursor:pointer;
  outline:none;border:1px solid #444;background:#222;color:#aaa;
  flex:0 0 auto;width:108px;text-align:center;
}
#sndbtn{
  font-size:13px;padding:5px 9px;border-radius:10px;cursor:pointer;
  border:1px solid #444;background:#222;color:#aaa;
  -webkit-tap-highlight-color:transparent;white-space:nowrap;flex-shrink:0;
}
#settingsbtn{
  font-size:20px;width:44px;height:44px;border-radius:12px;cursor:pointer;
  border:1px solid #444;background:#222;
  -webkit-tap-highlight-color:transparent;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
#settingsbtn:active{opacity:0.7;}

/* SPEED ROW */
#speedrow{
  flex:0 0 auto;display:flex;align-items:center;gap:2px;
  padding:2px 10px 3px;
}
#speedlbl{font-size:9px;color:#555;letter-spacing:1px;margin-right:3px;flex-shrink:0;}
.sdot{height:5px;flex:1;border-radius:3px;border:1px solid #333;background:#222;}

/* CANVAS */
#sborder{
  flex:1 1 auto;min-height:0;margin:0 10px;
  border-radius:12px;padding:0;border:3px solid #3fb950;
  overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 16px #3fb95044, 0 0 4px #3fb95066;
  transition: border-color 0.3s, box-shadow 0.3s;
}
#sscreen{position:relative;flex-shrink:0;}
canvas{display:block;}
#overlay{
  position:absolute;top:0;left:0;right:0;bottom:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:5px;pointer-events:none;background:rgba(0,0,0,0.52);
}
#otitle{font-size:22px;font-weight:800;letter-spacing:2px;text-align:center;color:#eee;}
#osub{font-size:12px;text-align:center;opacity:0.65;color:#eee;}

/* CONTROLS */
#controls{
  flex:0 0 auto;display:flex;align-items:center;justify-content:center;
  padding:5px 10px 5px;gap:10px;
}
#ccw{
  width:50px;height:50px;border-radius:12px;font-size:22px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  -webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;
  border:1.5px solid #c0392b;background:#c0392b;color:#fff;flex-shrink:0;
  margin-right:14px;touch-action:manipulation;
}
#cw{
  width:50px;height:50px;border-radius:12px;font-size:22px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  -webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;
  border:1.5px solid #27ae60;background:#27ae60;color:#fff;flex-shrink:0;
  margin-left:14px;touch-action:manipulation;
}
#ccw:active,#cw:active{opacity:0.7;}
#dpad{
  display:grid;grid-template-columns:50px 50px 50px;
  grid-template-rows:50px 50px 50px;gap:4px;flex-shrink:0;
}
.dp{
  width:50px;height:50px;border-radius:12px;
  background:#2a2a2a;border:1.5px solid #555;color:#ddd;font-size:20px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  -webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.dp:active{background:#3a3a3a;border-color:#888;}
#up   {grid-column:2;grid-row:1;}
#left {grid-column:1;grid-row:2;}
#right{grid-column:3;grid-row:2;}
#down {grid-column:2;grid-row:3;}

/* SETTINGS MODAL */
#settingsmodal{
  display:none;position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.80);align-items:flex-end;justify-content:center;z-index:100;
}
#settingsmodal.show{display:flex;}
#settingsbox{
  width:100%;max-width:440px;border-radius:20px 20px 0 0;
  padding:18px 16px 28px;border-top:1px solid #333;background:#1a1a1a;
}
#settingstitle{
  font-size:15px;font-weight:700;color:#eee;text-align:center;
  margin-bottom:14px;letter-spacing:0.5px;
}
.sgroup{margin-bottom:12px;}
.sgrouplabel{font-size:9px;letter-spacing:1.5px;color:#555;text-transform:uppercase;margin-bottom:6px;padding-left:2px;}
.skinrow-wrap{display:flex;align-items:center;gap:8px;overflow-x:auto;padding:4px 2px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.skinrow-wrap::-webkit-scrollbar{display:none;}
.skinbtn{
  width:42px;height:42px;border-radius:12px;border:2px solid transparent;
  cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;font-size:18px;touch-action:manipulation;
}
.skinbtn.active{border-color:#111;box-shadow:0 0 0 2px #111,0 0 0 4px rgba(255,255,255,0.5);transform:scale(1.1);}
.skinbtn:active{opacity:0.7;}
#closesettings{
  width:100%;padding:12px;border-radius:12px;background:#3fb950;
  border:none;color:#111;font-size:14px;font-weight:700;cursor:pointer;margin-top:6px;
}
#closesettings:active{opacity:0.8;}

/* NEW GAME MODAL */
#modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.78);align-items:center;justify-content:center;z-index:99;}
#modal.show{display:flex;}
#mbox{background:#1e1e1e;border-radius:14px;border:1px solid #444;padding:22px 24px;text-align:center;max-width:260px;width:85%;}
#mbox h3{color:#eee;font-size:15px;margin-bottom:6px;}
#mbox p{color:#888;font-size:12px;margin-bottom:18px;}
.mb{display:flex;gap:8px;justify-content:center;}
.mbt{padding:8px 20px;border-radius:9px;border:1px solid #555;background:transparent;color:#ccc;font-size:13px;cursor:pointer;}
.mbt.ok{background:#3fb950;border-color:#3fb950;color:#111;font-weight:700;}
</style>
</head>

<script>
// ── THEMES ───────────────────────────────────────────────────
var THEMES = {
  dark:{
    body:'#0a0a0f',text:'#eee',textDim:'#555',
    btnBg:'#1a1a24',btnBorder:'#2e2e42',btnText:'#ddd',
    selBg:'#1a1a24',selBorder:'#2e2e42',selText:'#aaa',
    lvlBorder:'#2e2e42',canBorder:'#3fb950',
    canGlow:'0 0 20px #3fb95055, 0 0 6px #3fb95088',
    canBg:'#0d1117',
    mBg:'#12121a',mBorder:'#2e2e42',mText:'#eee',
    sBg:'#12121a',sTopBorder:'#2e2e42',sLbl:'#555',
    dotOn:'#3fb950',dotOff:'#1a1a24',dotOffB:'#2e2e42',
    bg:'#0d1117',gr:'#12181f',sn:'#3fb950',sh:'#56d364',ey:'#0d1117'
  },
  light:{
    body:'#9aab8a',text:'#111',textDim:'#5a6a4a',
    btnBg:'#b8c8a8',btnBorder:'#7a9060',btnText:'#1a2a10',
    selBg:'#b8c8a8',selBorder:'#7a9060',selText:'#1a2a10',
    lvlBorder:'#7a9060',canBorder:'#2d7a20',
    canGlow:'0 0 20px #2d7a2066, 0 0 6px #2d7a2099',
    canBg:'#f0f8e8',
    mBg:'#c8d8b8',mBorder:'#7a9060',mText:'#111',
    sBg:'#c8d8b8',sTopBorder:'#7a9060',sLbl:'#5a6a4a',
    dotOn:'#2d7a20',dotOff:'#8a9a7a',dotOffB:'#7a9060',
    bg:'#f0f8e8',gr:'#e0ecd8',sn:'#2d8a2d',sh:'#38b038',ey:'#f0f8e8'
  },
  nokia:{
    body:'#2a3818',text:'#b8d870',textDim:'#5a7030',
    btnBg:'#3a4a22',btnBorder:'#6a8030',btnText:'#b8d870',
    selBg:'#3a4a22',selBorder:'#6a8030',selText:'#b8d870',
    lvlBorder:'#6a8030',canBorder:'#a8d820',
    canGlow:'0 0 20px #a8d82066, 0 0 6px #a8d82099',
    canBg:'#0e1a04',
    mBg:'#2a3818',mBorder:'#6a8030',mText:'#b8d870',
    sBg:'#2a3818',sTopBorder:'#6a8030',sLbl:'#5a7030',
    dotOn:'#a8d820',dotOff:'#2a3818',dotOffB:'#3a4a22',
    bg:'#0e1a04',gr:'#1a2808',sn:'#a8d820',sh:'#c8f040',ey:'#0e1a04'
  }
};
var t = THEMES.dark;

function applyTheme(name) {
  t = THEMES[name];
  document.body.style.background = t.body;
  document.body.style.color = t.text;
  document.getElementById('lvlbadge').style.borderColor = t.lvlBorder;
  document.getElementById('infobar').style.color = t.text;
  document.getElementById('agpllink').style.color = t.text;
  document.getElementById('thsel').style.background = t.selBg;
  document.getElementById('thsel').style.borderColor = t.selBorder;
  document.getElementById('thsel').style.color = t.selText;
  var sndbtn = document.getElementById('sndbtn');
  sndbtn.style.background = t.btnBg; sndbtn.style.borderColor = t.btnBorder; sndbtn.style.color = t.btnText;
  var sbtn = document.getElementById('settingsbtn');
  sbtn.style.background = t.btnBg; sbtn.style.borderColor = t.btnBorder;
  var sb = document.getElementById('sborder');
  sb.style.borderColor = t.canBorder;
  sb.style.boxShadow = t.canGlow || '';
  // background is now on canvas bg only, sborder has no bg (overflow:hidden clips canvas)
  document.getElementById('sscreen').style.background = t.bg;
  document.getElementById('sscreen').style.borderColor = t.canBorder;
  var dps = document.querySelectorAll('.dp');
  for (var i = 0; i < dps.length; i++) {
    dps[i].style.background = t.btnBg;
    dps[i].style.borderColor = t.btnBorder;
    dps[i].style.color = t.btnText;
  }
  var sbox = document.getElementById('settingsbox');
  sbox.style.background = t.sBg; sbox.style.borderColor = t.sTopBorder;
  document.getElementById('settingstitle').style.color = t.text;
  var sgls = document.querySelectorAll('.sgrouplabel');
  for (var i = 0; i < sgls.length; i++) sgls[i].style.color = t.sLbl;
  var mbox = document.getElementById('mbox');
  mbox.style.background = t.mBg; mbox.style.borderColor = t.mBorder; mbox.style.color = t.mText;
  var mbts = document.querySelectorAll('.mbt:not(.ok)');
  for (var i = 0; i < mbts.length; i++) { mbts[i].style.color = t.mText; mbts[i].style.borderColor = t.mBorder; }
  document.getElementById('speedlbl').style.color = t.textDim;
  updateDots();
  redrawState();
}

// ── CANVAS ───────────────────────────────────────────────────
var COLS = 20, ROWS = 20;
var cv = document.getElementById('c');
var ctx = cv.getContext('2d');
var CELL = 14, W = COLS*CELL, H = ROWS*CELL;
cv.width = W; cv.height = H;

function sizeCanvas() {
  var sb = document.getElementById('sborder');
  var aw = sb.clientWidth, ah = sb.clientHeight;
  var cw = Math.floor(aw / COLS), ch = Math.floor(ah / ROWS);
  CELL = Math.max(8, Math.min(cw, ch));
  W = COLS * CELL; H = ROWS * CELL;
  cv.width = W; cv.height = H;
  var sc = document.getElementById('sscreen');
  // sscreen fills sborder fully so no background gaps show
  sc.style.width = aw + 'px'; sc.style.height = ah + 'px';
}

// ── LEVELS ───────────────────────────────────────────────────
var NUM_LEVELS = 20;
var LEVEL_SPEEDS = [600,570,540,510,480,450,420,390,360,330,300,270,240,210,180,150,120,90,60,30];
var LEVEL_THRESHOLDS = [0,12,28,48,72,100,132,168,208,252,300,352,408,468,532,600,672,748,828,912];
var LEVEL_NAMES = ['Acemi','Çaylak','Acemi Pro','Orta','Orta+','Tecrübeli','Usta','Usta+','Uzman','Uzman+','Efsane','Efsane+','Tanrısal','Tanrısal+','Ultra','Ultra+','Max','Max+','∞-1','∞'];

// Build speed dots
(function() {
  var row = document.getElementById('speedrow');
  for (var i = 0; i < NUM_LEVELS; i++) {
    var d = document.createElement('div');
    d.className = 'sdot'; d.id = 'dot' + i;
    row.appendChild(d);
  }
})();

function updateDots() {
  for (var i = 0; i < NUM_LEVELS; i++) {
    var d = document.getElementById('dot' + i);
    if (!d) continue;
    d.style.background = (i < level) ? t.dotOn : t.dotOff;
    d.style.borderColor = (i < level) ? t.dotOn : t.dotOffB;
  }
  document.getElementById('lvlnum').textContent = String(level);
  document.getElementById('lvltxt').textContent = LEVEL_NAMES[level - 1] || ('Lv ' + level);
}

function getLvlForLen(len) {
  var lv = 1;
  for (var i = 0; i < LEVEL_THRESHOLDS.length; i++) {
    if (len >= LEVEL_THRESHOLDS[i]) lv = i + 1;
  }
  return Math.min(lv, NUM_LEVELS);
}

// ── SKINS ────────────────────────────────────────────────────
var SNAKE_SKINS = [
  { id:'classic', label:'🟢', sc:'#3fb950', hc:'#56d364', sharp:false },
  { id:'ocean',   label:'🔵', sc:'#58a6ff', hc:'#79c0ff', sharp:false },
  { id:'fire',    label:'🔴', sc:'#e05252', hc:'#ff7b72', sharp:false },
  { id:'gold',    label:'🟡', sc:'#d4a017', hc:'#f0c040', sharp:false },
  { id:'purple',  label:'🟣', sc:'#8b5cf6', hc:'#a78bfa', sharp:false },
  { id:'neon',    label:'⚡', sc:'#00ff88', hc:'#66ffbb', sharp:true  },
  { id:'retro',   label:'👾', sc:'#a8ff00', hc:'#ccff55', sharp:true  },
  { id:'ice',     label:'🧊', sc:'#a0d8ef', hc:'#d0f0ff', sharp:false },
  { id:'dark',    label:'🖤', sc:'#666',    hc:'#999',    sharp:false },
  { id:'pink',    label:'🩷', sc:'#ff6b9d', hc:'#ffaacc', sharp:false }
];
var FOOD_SKINS = [
  { id:'apple',   label:'🍎', emoji:'🍎', color:'#f85149' },
  { id:'cherry',  label:'🍒', emoji:'🍒', color:'#cc2255' },
  { id:'lemon',   label:'🍋', emoji:'🍋', color:'#f0c040' },
  { id:'grape',   label:'🍇', emoji:'🍇', color:'#9b59b6' },
  { id:'orange',  label:'🍊', emoji:'🍊', color:'#ff8c00' },
  { id:'star',    label:'⭐', emoji:'⭐', color:'#ffd700' },
  { id:'diamond', label:'💎', emoji:'💎', color:'#00cfff' },
  { id:'neon',    label:'🔮', emoji:'🔮', color:'#ff00ff' },
  { id:'heart',   label:'❤️', emoji:'❤️', color:'#ff2255' },
  { id:'fire',    label:'🔥', emoji:'🔥', color:'#ff6600' }
];
var curSnake = SNAKE_SKINS[0];
var curFood  = FOOD_SKINS[0];

function buildPicker(rowId, items, getKey, colorKey, onPick) {
  var row = document.getElementById(rowId);
  row.innerHTML = '';
  items.forEach(function(item) {
    var btn = document.createElement('button');
    btn.className = 'skinbtn' + (item.id === getKey() ? ' active' : '');
    btn.innerHTML = item.label;
    btn.style.background = item[colorKey];
    btn.onclick = function() {
      onPick(item);
      var all = row.querySelectorAll('.skinbtn');
      for (var i = 0; i < all.length; i++) all[i].className = 'skinbtn';
      btn.className = 'skinbtn active';
      if (state === 'playing') draw();
    };
    row.appendChild(btn);
  });
}

function buildSkinPickers() {
  buildPicker('snakerow', SNAKE_SKINS, function(){ return curSnake.id; }, 'sc', function(s){ curSnake = s; });
  buildPicker('foodrow',  FOOD_SKINS,  function(){ return curFood.id;  }, 'color', function(s){ curFood = s; });
}

// ── AUDIO ─────────────────────────────────────────────────────
var AC = window.AudioContext || window.webkitAudioContext;
var ac = null;
var soundOn = true;

function initAC() {
  if (!AC) return;
  if (!ac) { ac = new AC(); }
  if (ac.state === 'suspended') { ac.resume(); }
}

function beep(freq, dur, tp) {
  if (!soundOn) return;
  try {
    initAC();
    if (!ac) return;
    var o = ac.createOscillator(), g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type = tp || 'square'; o.frequency.value = freq;
    g.gain.setValueAtTime(0.07, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    o.start(); o.stop(ac.currentTime + dur);
  } catch(e) {}
}
var diePlayd = false;
function eatS() { beep(880, 0.07); }
function lvlS() { beep(660, 0.05); setTimeout(function(){ beep(880, 0.08); }, 80); }
function dieS() {
  if (diePlayd) return; diePlayd = true;
  initAC();
  // Kısa gecikme: AC resume için zaman tanı
  setTimeout(function(){ playDieTones(); }, 30);
}
function playDieTones() {
  beep(300, 0.15);
  setTimeout(function(){ beep(200, 0.15); }, 160);
  setTimeout(function(){ beep(120, 0.25); }, 320);
}

// ── DRAW HELPERS ─────────────────────────────────────────────
function rr(x, y, w, h, r) {
  r = Math.min(r || 0, w/2, h/2);
  ctx.beginPath();
  ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y); ctx.arcTo(x+w, y, x+w, y+r, r);
  ctx.lineTo(x+w, y+h-r); ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
  ctx.lineTo(x+r, y+h); ctx.arcTo(x, y+h, x, y+h-r, r);
  ctx.lineTo(x, y+r); ctx.arcTo(x, y, x+r, y, r);
  ctx.closePath();
}
function drawStar(cx, cy, r) {
  ctx.beginPath();
  for (var i = 0; i < 5; i++) {
    var a1 = Math.PI/2 + i*2*Math.PI/5;
    var a2 = a1 + Math.PI/5;
    var x1 = cx + r*Math.cos(a1), y1 = cy - r*Math.sin(a1);
    var x2 = cx + r*0.42*Math.cos(a2), y2 = cy - r*0.42*Math.sin(a2);
    if (i === 0) ctx.moveTo(x1, y1); else ctx.lineTo(x1, y1);
    ctx.lineTo(x2, y2);
  }
  ctx.closePath(); ctx.fill();
}

// ── GAME STATE ────────────────────────────────────────────────
var snake = [], dir = {x:1,y:0}, food = {x:5,y:5};
var dirQueue = [];
var score = 0, best = 0, level = 1;
var state = 'idle', loop = null;
var wallPass = false;

// Direction rotation
var DIRS = [{x:0,y:-1},{x:1,y:0},{x:0,y:1},{x:-1,y:0}];
function dirIdx(d) {
  for (var i = 0; i < DIRS.length; i++) {
    if (DIRS[i].x === d.x && DIRS[i].y === d.y) return i;
  }
  return 1;
}
function queueDir(d) {
  var last = dirQueue.length > 0 ? dirQueue[dirQueue.length-1] : dir;
  if (d.x === -last.x && d.y === -last.y) return;
  if (d.x === last.x  && d.y === last.y)  return;
  if (dirQueue.length < 3) dirQueue.push(d);
}
function rotateCCW() { // * saat yönü tersi
  var next = DIRS[(dirIdx(dir) + 3) % 4];
  if (next.x === -dir.x && next.y === -dir.y) return;
  dir = next; dirQueue = [];
  if (state === 'playing') { clearInterval(loop); step(); loop = setInterval(step, LEVEL_SPEEDS[level-1]); }
}
function rotateCW() { // # saat yönü
  var next = DIRS[(dirIdx(dir) + 1) % 4];
  if (next.x === -dir.x && next.y === -dir.y) return;
  dir = next; dirQueue = [];
  if (state === 'playing') { clearInterval(loop); step(); loop = setInterval(step, LEVEL_SPEEDS[level-1]); }
}

function init() {
  diePlayd = false;
  var mx = Math.floor(COLS/2), my = Math.floor(ROWS/2);
  snake = [{x:mx,y:my},{x:mx-1,y:my},{x:mx-2,y:my}];
  dir = {x:1,y:0}; dirQueue = [];
  score = 0; level = 1;
  document.getElementById('score').textContent = '0';
  updateDots(); placeFood(); hide();
}

function placeFood() {
  var p, ok, i;
  do {
    p = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)};
    ok = true;
    for (i = 0; i < snake.length; i++) {
      if (snake[i].x === p.x && snake[i].y === p.y) { ok = false; break; }
    }
  } while (!ok);
  food = p;
}

function step() {
  if (dirQueue.length > 0) dir = dirQueue.shift();
  var h = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
  // Duvar geçişi
  if (wallPass) {
    h.x = (h.x + COLS) % COLS;
    h.y = (h.y + ROWS) % ROWS;
  }
  var hit = !wallPass && (h.x < 0 || h.x >= COLS || h.y < 0 || h.y >= ROWS);
  if (!hit) {
    for (var i = 0; i < snake.length; i++) {
      if (snake[i].x === h.x && snake[i].y === h.y) { hit = true; break; }
    }
  }
  if (hit) { gameOver(); return; }
  snake.unshift(h);
  if (h.x === food.x && h.y === food.y) {
    score++;
    document.getElementById('score').textContent = String(score);
    if (score > best) { best = score; document.getElementById('best').textContent = String(best); }
    eatS(); placeFood();
    var nl = getLvlForLen(snake.length);
    if (nl > level) { level = nl; lvlS(); updateDots(); clearInterval(loop); loop = setInterval(step, LEVEL_SPEEDS[level-1]); }
  } else {
    snake.pop();
  }
  draw();
}

function gameOver() {
  state = 'dead';
  if (loop) { clearInterval(loop); loop = null; }
  dieS(); upBtn();
  show('OYUN BİTTİ', 'Tekrar için yeşil tuşa bas');
}

function eyePos(px, py, sz) {
  if (dir.x === 1)  return [px+sz-5, py+4,    px+sz-5, py+sz-7];
  if (dir.x === -1) return [px+3,    py+4,    px+3,    py+sz-7];
  if (dir.y === 1)  return [px+4,    py+sz-5, px+sz-7, py+sz-5];
  return [px+4, py+3, px+sz-7, py+3];
}

function draw() {
  var i, s, px, py, sz, e;
  ctx.fillStyle = t.bg; ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = t.gr; ctx.lineWidth = 0.5;
  for (i = 0; i <= W; i += CELL) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,H); ctx.stroke(); }
  for (i = 0; i <= H; i += CELL) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(W,i); ctx.stroke(); }

  var cr = curSnake.sharp ? 2 : Math.floor(CELL*0.3);
  var br = curSnake.sharp ? 1 : Math.floor(CELL*0.2);
  for (i = 0; i < snake.length; i++) {
    s = snake[i];
    ctx.fillStyle = (i === 0) ? curSnake.hc : curSnake.sc;
    px = s.x*CELL+1; py = s.y*CELL+1; sz = CELL-2;
    rr(px, py, sz, sz, (i === 0) ? cr : br); ctx.fill();
    if (i === 0) {
      ctx.fillStyle = t.ey;
      e = eyePos(px, py, sz);
      ctx.beginPath(); ctx.arc(e[0],e[1],Math.max(1,CELL*0.08),0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(e[2],e[3],Math.max(1,CELL*0.08),0,Math.PI*2); ctx.fill();
    }
  }

  var fx = food.x*CELL + CELL/2;
  var fy = food.y*CELL + CELL/2;
  var fontSize = Math.max(10, Math.floor(CELL * 0.78));
  ctx.font = fontSize + 'px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(curFood.emoji, fx, fy);
}

function hide() { document.getElementById('overlay').style.display = 'none'; }
function show(title, sub) {
  var ov = document.getElementById('overlay');
  ov.style.display = 'flex';
  document.getElementById('otitle').textContent = title;
  document.getElementById('otitle').style.color = t.text;
  document.getElementById('osub').textContent = sub;
  document.getElementById('osub').style.color = t.text;
  if (snake && snake.length > 0) draw();
  ctx.fillStyle = 'rgba(0,0,0,0.38)'; ctx.fillRect(0,0,W,H);
}
function redrawState() {
  if      (state === 'idle')    show('SNAKE', 'Yeşil tuşa bas');
  else if (state === 'playing') draw();
  else if (state === 'paused')  show('DURAKLATILDI', 'Devam için yeşil tuşa bas');
  else if (state === 'dead')    show('OYUN BİTTİ', 'Tekrar için yeşil tuşa bas');
  else { ctx.fillStyle = t.bg; ctx.fillRect(0,0,W,H); }
}

function upBtn() {
  var b = document.getElementById('startbtn');
  if (state === 'playing') { b.innerHTML = '⏸'; b.className = 'pau'; }
  else { b.innerHTML = '&#9654;'; b.className = ''; }
}

function startGame() {
  if (loop) { clearInterval(loop); loop = null; }
  state = 'playing'; init();
  loop = setInterval(step, LEVEL_SPEEDS[0]);
  draw(); upBtn();
}
function pauseGame() {
  state = 'paused';
  if (loop) { clearInterval(loop); loop = null; }
  upBtn(); show('DURAKLATILDI', 'Devam için yeşil tuşa bas');
}
function resumeGame() {
  state = 'playing'; hide();
  loop = setInterval(step, LEVEL_SPEEDS[level-1]);
  upBtn();
}
function handleStart() {
  if (state === 'idle' || state === 'dead') { startGame(); return; }
  if (state === 'paused') { resumeGame(); return; }
  if (state === 'playing') { pauseGame(); document.getElementById('modal').className = 'show'; }
}

// ── WALL TOGGLE ──────────────────────────────────────────────
function toggleWall() {
  wallPass = !wallPass;
  var btn = document.getElementById('wallbtn');
  if (wallPass) {
    btn.textContent = 'AÇIK';
    btn.style.background = '#3fb950';
  } else {
    btn.textContent = 'KAPALI';
    btn.style.background = '#555';
  }
}

// ── EVENTS ────────────────────────────────────────────────────
document.getElementById('startbtn').onclick = function() {
  initAC(); // iOS: kullanıcı etkileşiminde AC başlat
  handleStart();
};
document.getElementById('mno').onclick  = function() { document.getElementById('modal').className = ''; resumeGame(); };
document.getElementById('myes').onclick = function() { document.getElementById('modal').className = ''; startGame(); };

document.getElementById('thsel').onchange    = function() { applyTheme(this.value); };
document.getElementById('sndbtn').onclick    = function() { soundOn = !soundOn; this.innerHTML = soundOn ? '🔊 Ses' : '🔇 Ses'; };
document.getElementById('settingsbtn').onclick = function() { if (state === 'playing') pauseGame(); document.getElementById('settingsmodal').className = 'show'; };
document.getElementById('closesettings').onclick = function() { document.getElementById('settingsmodal').className = ''; };

document.getElementById('up').onclick    = function() { queueDir({x:0,y:-1}); };
document.getElementById('down').onclick  = function() { queueDir({x:0,y:1});  };
document.getElementById('left').onclick  = function() { queueDir({x:-1,y:0}); };
document.getElementById('right').onclick = function() { queueDir({x:1,y:0});  };
document.getElementById('ccw').onclick   = rotateCCW;
document.getElementById('cw').onclick    = rotateCW;

document.addEventListener('keydown', function(e) {
  var k = e.key;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' ','Enter'].indexOf(k) >= 0) e.preventDefault();
  if      (k === 'ArrowUp')    queueDir({x:0,y:-1});
  else if (k === 'ArrowDown')  queueDir({x:0,y:1});
  else if (k === 'ArrowLeft')  queueDir({x:-1,y:0});
  else if (k === 'ArrowRight') queueDir({x:1,y:0});
  else if (k === '*') rotateCCW();
  else if (k === '#') rotateCW();
  else if (k === ' ' || k === 'Enter') handleStart();
});

var swTx = 0, swTy = 0;
document.getElementById('c').addEventListener('touchstart', function(e) {
  swTx = e.touches[0].clientX; swTy = e.touches[0].clientY; e.preventDefault();
}, {passive:false});
document.getElementById('c').addEventListener('touchend', function(e) {
  var dx = e.changedTouches[0].clientX - swTx;
  var dy = e.changedTouches[0].clientY - swTy;
  if (Math.abs(dx) < 8 && Math.abs(dy) < 8) return;
  if (Math.abs(dx) > Math.abs(dy)) {
    if (dx > 0) queueDir({x:1,y:0}); else queueDir({x:-1,y:0});
  } else {
    if (dy > 0) queueDir({x:0,y:1}); else queueDir({x:0,y:-1});
  }
  e.preventDefault();
}, {passive:false});

document.addEventListener('visibilitychange', function() {
  if (document.hidden && state === 'playing') pauseGame();
});

// ── BOOT ─────────────────────────────────────────────────────
window.addEventListener('load', function() {
  sizeCanvas();
  buildSkinPickers();
  applyTheme('dark');
  updateDots();
  ctx.fillStyle = t.bg; ctx.fillRect(0,0,W,H);
  show('SNAKE', 'Yeşil tuşa bas');
  // Ensure sborder uses canBg not body bg on init
  document.getElementById('sborder').style.background = t.canBg || t.bg;
  document.getElementById('sborder').style.boxShadow = t.canGlow || '';
});
</script>
